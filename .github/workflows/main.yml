name: CI — Lint, Test & Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: mlops-sentinel

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Code quality (flake8 + black)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting dependencies
        run: pip install flake8 black

      - name: Run black (check mode — no reformatting)
        run: black --check --diff src/ tests/

      - name: Run flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --count \
            --statistics

  # ---------------------------------------------------------------------------
  # Job 2: Unit & integration tests
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model (needed for API tests)
        run: python -m src.training.train --n-samples 500

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --asyncio-mode=auto \
            -v

  # ---------------------------------------------------------------------------
  # Job 3: Docker build validation (does not push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

